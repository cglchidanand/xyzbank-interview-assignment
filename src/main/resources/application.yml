spring:

  application:
    name: xyz-bank-project

  datasource:
    url: jdbc:mysql://localhost:3306/xyz_bank
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100

server:
  port: 8080
  
  springdoc:
    swagger-ui:
      path: /swagger-ui.html

jwt:
  secret: mySuperSecretKeyForJwtAuthenticationMySuperSecretKey
  expiration: 86400000

file:
  upload-dir: documents/

logging:
  level:
    org.springframework.security: DEBUG